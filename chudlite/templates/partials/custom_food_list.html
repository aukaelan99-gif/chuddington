<div id="custom-food-list">
  {% if custom_foods %}
  <table class="w-full text-sm mt-2">
    <thead>
      <tr class="text-left text-gray-400 text-xs border-b">
        <th class="pb-1">Name</th>
        <th class="pb-1">Category</th>
        <th class="pb-1">Serving (g)</th>
        <th class="pb-1">Calories (kcal)</th>
        <th class="pb-1">P/C/F (g)</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      {% for f in custom_foods %}
      <tr class="border-b last:border-0">
        <td colspan="6" class="py-2">
          <form hx-post="/diet/foods/custom/{{ f.id }}/update"
                hx-target="#custom-food-list"
                hx-swap="outerHTML"
          class="custom-food-edit-form grid grid-cols-12 gap-2 items-center">
            <input name="name" value="{{ f.name }}" required class="col-span-2 border rounded px-2 py-1" />
            <select name="category" class="col-span-2 border rounded px-2 py-1 text-sm">
              {% for c in ["protein","vegetable","fruit","grain","dairy","fat","snack","beverage","other"] %}
              <option value="{{ c }}" {% if f.category == c %}selected{% endif %}>{{ c|capitalize }}</option>
              {% endfor %}
            </select>
            <input name="base_grams" type="number" min="1" max="5000" step="1" value="{{ f.base_grams|int }}" class="col-span-2 border rounded px-2 py-1" />
            <div class="custom-edit-kcal col-span-1 text-xs text-gray-500">{{ f.calories }} kcal</div>
            <input name="protein_g" type="number" step="0.1" min="0" max="500" value="{{ f.protein_g }}" class="col-span-1 border rounded px-2 py-1" />
            <input name="carbs_g" type="number" step="0.1" min="0" max="500" value="{{ f.carbs_g }}" class="col-span-1 border rounded px-2 py-1" />
            <input name="fat_g" type="number" step="0.1" min="0" max="500" value="{{ f.fat_g }}" class="col-span-1 border rounded px-2 py-1" />
            <div class="col-span-2 flex gap-2 justify-end whitespace-nowrap">
              <button type="submit" class="text-xs font-medium px-3 py-1 rounded border border-indigo-200 text-indigo-700 bg-indigo-50 hover:bg-indigo-100">Save</button>
              <button type="button" class="text-xs font-medium px-3 py-1 rounded border border-red-200 text-red-600 bg-red-50 hover:bg-red-100"
                      hx-post="/diet/foods/custom/{{ f.id }}/delete"
                      hx-target="#custom-food-list"
                      hx-swap="outerHTML">Delete</button>
            </div>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  {% else %}
  <p class="text-sm text-gray-400 mt-2">No custom foods yet.</p>
  {% endif %}
</div>
