{% extends "base.html" %}
{% block title %}Settings — StudyWell{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">Daily Goals</h1>

<div class="bg-white rounded-xl shadow p-6 max-w-sm">
  <form action="/settings/" method="post" class="flex flex-col gap-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Study Goal (minutes)</label>
      <input type="number" name="study_minutes" value="{{ goals.study_minutes }}" min="15" max="720" required
             class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Exercise Goal (minutes)</label>
      <input type="number" name="exercise_minutes" value="{{ goals.exercise_minutes }}" min="5" max="300" required
             class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Calorie Target</label>
      <input type="number" name="calorie_target" value="{{ goals.calorie_target }}" min="500" max="5000" required
             class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Water Goal (glasses)</label>
      <input type="number" name="water_glasses" value="{{ goals.water_glasses }}" min="1" max="20" required
             class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
    </div>
    <button type="submit"
            class="px-5 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-medium">
      Save Goals
    </button>
  </form>
</div>
{% endblock %}
