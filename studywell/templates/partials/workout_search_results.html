{% for r in results %}
<li class="px-3 py-2 hover:bg-indigo-50 cursor-pointer text-sm flex justify-between gap-3"
    onclick="fillExercise('{{ r.name|replace("'", "\\'") }}','{{ r.type }}','{{ r.muscle_group }}')">
  <span class="font-medium">{{ r.name }}</span>
  <span class="text-xs text-gray-400">{{ r.type }} · {{ r.muscle_group|replace('_', ' ') }}</span>
</li>
{% endfor %}
