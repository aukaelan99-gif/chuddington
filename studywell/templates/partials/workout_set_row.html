{% set is_weighted   = ex.exercise_type.value == "weighted" %}
{% set is_bodyweight = ex.exercise_type.value == "bodyweight" %}
{% set is_cardio     = ex.exercise_type.value == "cardio" %}
<tr class="border-b hover:bg-gray-50 text-sm" data-set-row="1">
  <td class="py-1.5 text-gray-500 align-middle" data-set-number>{{ s.set_number }}</td>
  {% if is_cardio %}
  <td class="py-1.5">
    <input type="number" data-duration min="0" max="600" step="0.1" value="{{ s.duration_minutes if s.duration_minutes is not none else '' }}"
           placeholder="Minutes"
           class="w-24 border rounded-lg px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
  </td>
  <td class="py-1.5">
    <input type="number" data-distance min="0" max="200" step="0.1" value="{{ s.distance_km if s.distance_km is not none else '' }}"
           placeholder="km"
           class="w-24 border rounded-lg px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
  </td>
  {% else %}
  <td class="py-1.5">
    <input type="number" data-reps min="1" max="200" value="{{ s.reps if s.reps is not none else '' }}"
           placeholder="Reps"
           class="w-20 border rounded-lg px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
  </td>
  {% if is_weighted or is_bodyweight %}
  <td class="py-1.5">
    <input type="number" data-weight step="0.5" min="0" max="500" value="{{ s.weight_kg if s.weight_kg is not none else '' }}"
           placeholder="{% if is_bodyweight %}Added weight{% else %}Weight{% endif %}"
           class="w-28 border rounded-lg px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
  </td>
  {% endif %}
  {% endif %}
  <td class="py-1.5 text-right">
    <button type="button"
            onclick="this.closest('tr').remove(); renumberSets('{{ ex.id }}')"
            class="px-2.5 py-1 bg-rose-100 text-rose-700 rounded-lg hover:bg-rose-200 text-xs font-semibold">
      Remove
    </button>
  </td>
</tr>
