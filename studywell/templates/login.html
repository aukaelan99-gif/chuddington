<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Chudlite™</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex items-center justify-center">
<div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm mx-4">
  <div class="text-center mb-6">
    <img src="/static/branding/app-icon.png" alt="Chudlite icon" class="w-16 h-16 mx-auto mb-2 object-contain" />
    <h1 class="text-2xl font-bold">Welcome back</h1>
    <p class="text-sm text-gray-500 mt-1">Sign in to Chudlite™</p>
  </div>

  {% if error %}
  <div class="mb-4 px-4 py-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">{{ error }}</div>
  {% endif %}

  <form action="/login" method="post" class="flex flex-col gap-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
      <input type="text" name="username" required autofocus autocomplete="username"
             class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input type="password" name="password" required autocomplete="current-password"
             class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
    </div>
    <button type="submit"
            class="w-full py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-semibold text-sm mt-1">
      Sign In
    </button>
  </form>

  <p class="text-center text-sm text-gray-500 mt-5">
    No account? <a href="/register" class="text-indigo-600 hover:underline font-medium">Create one</a>
  </p>
</div>
</body>
</html>
