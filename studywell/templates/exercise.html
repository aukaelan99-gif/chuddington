{% extends "base.html" %}
{% block title %}Exercise — StudyWell{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-2">Exercise Tracker</h1>

<!-- Start Workout CTA -->
<div class="mb-6">
  <form action="/workout/new" method="post" class="flex gap-3 items-center flex-wrap">
    <input type="text" name="name" placeholder="Workout name (optional)"
           class="border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 w-56" />
    <button type="submit"
            class="px-5 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-semibold text-sm">
      🏋️ Start Workout
    </button>
  </form>
</div>

<!-- Stats strip -->
<div class="grid grid-cols-2 gap-4 mb-6">
  <div class="bg-white rounded-xl shadow p-4 text-center">
    <div class="text-xs text-gray-500 uppercase tracking-wide">Weekly Total</div>
    <div class="text-3xl font-bold text-green-600 mt-1">{{ weekly_total }}<span class="text-base font-normal text-gray-400"> min</span></div>
  </div>
  <div class="bg-white rounded-xl shadow p-4 text-center">
    <div class="text-xs text-gray-500 uppercase tracking-wide">Current Streak</div>
    <div class="text-3xl font-bold text-orange-500 mt-1">{{ streak }}<span class="text-base font-normal text-gray-400"> day{% if streak != 1 %}s{% endif %}</span></div>
  </div>
</div>

<!-- Weekly chart -->
<div class="bg-white rounded-xl shadow p-6 mb-6">
  <div class="font-semibold mb-4">Exercise Minutes — Last 7 Days</div>
  <canvas id="exerciseChart" height="120"></canvas>
</div>

<!-- Muscle distribution chart -->
<div class="bg-white rounded-xl shadow p-6">
  <div class="font-semibold mb-4">Muscle Groups Worked — Last 7 Days</div>
  <canvas id="muscleChart" height="120"></canvas>
</div>

<script>
new Chart(document.getElementById('exerciseChart'), {
  type: 'line',
  data: {
    labels: {{ labels | tojson }},
    datasets: [{
      label: 'Minutes',
      data: {{ weekly_minutes | tojson }},
      borderColor: 'rgb(34,197,94)',
      backgroundColor: 'rgba(34,197,94,0.15)',
      tension: 0.3,
      fill: true,
    }]
  },
  options: { responsive: true, scales: { y: { beginAtZero: true, title: { display: true, text: 'Minutes' } } } }
});

new Chart(document.getElementById('muscleChart'), {
  type: 'bar',
  data: {
    labels: {{ dist_labels | tojson }},
    datasets: [{
      label: 'Sets Logged',
      data: {{ dist_values | tojson }},
      backgroundColor: 'rgba(79,70,229,0.75)',
      borderRadius: 6,
    }]
  },
  options: {
    responsive: true,
    scales: {
      y: { beginAtZero: true, title: { display: true, text: 'Sets' } }
    }
  }
});
</script>
{% endblock %}
