{% extends "base.html" %}
{% block title %}Exercise — StudyWell{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-5">
  <h1 class="text-2xl font-bold">Exercise Tracker</h1>
  <a href="/workout/history" class="text-sm text-indigo-600 hover:underline">View History</a>
</div>

<!-- Start workout + goal in one row -->
<div class="bg-white rounded-xl shadow p-4 mb-5 flex flex-col gap-3">
  <form action="/workout/new" method="post" class="flex gap-2 items-center flex-wrap">
    <input type="text" name="name" placeholder="Workout name (optional)"
           class="border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 flex-1 min-w-0" />
    <button type="submit"
            class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-semibold text-sm whitespace-nowrap">
      🏋️ Start Workout
    </button>
  </form>
  <form action="/exercise/goal" method="post" class="flex gap-2 items-center flex-wrap">
    <label class="text-xs text-gray-500 whitespace-nowrap">Daily goal (min):</label>
    <input type="number" name="exercise_minutes" min="5" max="300" value="{{ exercise_goal }}"
           class="border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400 w-24" required />
    <button type="submit"
            class="px-3 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 text-sm font-medium whitespace-nowrap">
      Save
    </button>
  </form>
</div>

<!-- Stats strip -->
<div class="grid grid-cols-2 gap-4 mb-5">
  <div class="bg-white rounded-xl shadow p-4 text-center">
    <div class="text-xs text-gray-500 uppercase tracking-wide">Weekly Total</div>
    <div class="text-3xl font-bold text-green-600 mt-1">{{ weekly_total }}<span class="text-base font-normal text-gray-400"> min</span></div>
  </div>
  <div class="bg-white rounded-xl shadow p-4 text-center">
    <div class="text-xs text-gray-500 uppercase tracking-wide">Current Streak</div>
    <div class="text-3xl font-bold text-orange-500 mt-1">{{ streak }}<span class="text-base font-normal text-gray-400"> day{% if streak != 1 %}s{% endif %}</span></div>
  </div>
</div>

<!-- Muscle distribution chart -->
<div class="bg-white rounded-xl shadow p-6">
  <div class="font-semibold mb-4">Muscle Group Leverage — Last 7 Days</div>
  <canvas id="muscleChart" height="120"></canvas>
</div>

<script>
new Chart(document.getElementById('muscleChart'), {
  type: 'radar',
  data: {
    labels: {{ dist_labels | tojson }},
    datasets: [{
      label: 'Sets Logged',
      data: {{ dist_values | tojson }},
      borderColor: 'rgba(79,70,229,1)',
      backgroundColor: 'rgba(79,70,229,0.20)',
      pointBackgroundColor: 'rgba(79,70,229,1)',
      pointRadius: 3,
    }]
  },
  options: {
    responsive: true,
    scales: { r: { beginAtZero: true, ticks: { precision: 0 } } }
  }
});
</script>
{% endblock %}
