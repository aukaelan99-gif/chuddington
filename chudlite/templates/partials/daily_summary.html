<!-- daily_summary partial — re-fetch after any log to refresh dashboard cards -->
<div id="daily-summary" class="grid grid-cols-2 gap-4">
  <div class="bg-white rounded-xl shadow p-4">
    <div class="text-xs text-gray-500 uppercase tracking-wide mb-1">Study Today</div>
    <div class="text-2xl font-bold text-indigo-600">{{ study_hours }}h</div>
    <div class="mt-2 h-2 bg-gray-100 rounded-full overflow-hidden">
      <div class="h-2 bg-indigo-500 rounded-full progress-bar" style="width: {{ study_pct }}%"></div>
    </div>
  </div>
  <div class="bg-white rounded-xl shadow p-4">
    <div class="text-xs text-gray-500 uppercase tracking-wide mb-1">Exercise Today</div>
    <div class="text-2xl font-bold text-green-600">{{ exercise_mins }}m</div>
    <div class="mt-2 h-2 bg-gray-100 rounded-full overflow-hidden">
      <div class="h-2 bg-green-500 rounded-full progress-bar" style="width: {{ exercise_pct }}%"></div>
    </div>
  </div>
  <div class="bg-white rounded-xl shadow p-4">
    <div class="text-xs text-gray-500 uppercase tracking-wide mb-1">Calories Today</div>
    <div class="text-2xl font-bold text-orange-500">{{ calories }}</div>
    <div class="mt-2 h-2 bg-gray-100 rounded-full overflow-hidden">
      <div class="h-2 bg-orange-400 rounded-full progress-bar" style="width: {{ calorie_pct }}%"></div>
    </div>
  </div>
  <div class="bg-white rounded-xl shadow p-4">
    <div class="text-xs text-gray-500 uppercase tracking-wide mb-1">Water Today</div>
    <div class="text-2xl font-bold text-blue-500 flex items-center gap-2">
      <span>{{ water }}</span>
      <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3.5c0 0-5 5.5-5 9a5 5 0 0010 0c0-3.5-5-9-5-9z" />
      </svg>
    </div>
    <div class="mt-2 h-2 bg-gray-100 rounded-full overflow-hidden">
      <div class="h-2 bg-blue-400 rounded-full progress-bar" style="width: {{ water_pct }}%"></div>
    </div>
  </div>
</div>
