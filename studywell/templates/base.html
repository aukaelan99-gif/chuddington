<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Chudlite™{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    (function () {
      const allowed = new Set(['classic', 'retro', 'twilight', 'purple', 'violet', 'dark', 'winter', 'spring']);
      const match = document.cookie.match(/(?:^|; )site_theme=([^;]+)/);
      const raw = match ? decodeURIComponent(match[1]) : 'classic';
      const theme = allowed.has(raw) ? raw : 'classic';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>

  <!-- Mobile bottom nav -->

    </a>

      <svg class="w-5 h-5" fill="none" stroke="white" stroke-width="1.75" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z"/></svg>

  <!-- Main content -->
  <main class="md:ml-56 pb-20 md:pb-6 px-4 md:px-6 lg:px-8 py-6 {% block main_width_class %}max-w-none{% endblock %}">

      --theme-text-700: #2d6338;
      --theme-text-600: #40784b;
      --theme-text-500: #5d9670;
      --theme-text-400: #7ab08a;
      --theme-surface: #ffffff;
      --theme-surface-alt: #effbf0;
      --theme-border-200: #cdeacd;
      --theme-border-100: #dcf3dc;
      --theme-accent-700: #2f855a;
      --theme-accent-600: #38a169;
      --theme-accent-100: #d9f5df;
      --theme-accent-50: #eafaf0;
      --theme-accent-text: #2f855a;
      --theme-nav-bg: #2f855a;
      --theme-nav-text: #f6fff8;
      --theme-nav-muted: #ccefd8;
      --theme-nav-border: #38a169;
      --theme-nav-hover: rgba(245, 255, 247, 0.2);
      --theme-focus-ring: rgba(56, 161, 105, 0.45);
      --theme-font-body: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

    body {

      color: var(--theme-text-800) !important;
      font-family: var(--theme-font-body);
      font-size: var(--theme-font-size-base);
      line-height: var(--theme-line-height);
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: var(--theme-font-heading);
      letter-spacing: var(--theme-heading-spacing);
    }

    button,
    input,
    select,
    textarea {
      font-family: inherit;
    }

    body .bg-gray-50 { background-color: var(--theme-page-bg) !important; }
    body .bg-white { background-color: var(--theme-surface) !important; }
    body .from-gray-50 { --tw-gradient-from: var(--theme-surface-alt) var(--tw-gradient-from-position) !important; }
    body .to-white { --tw-gradient-to: var(--theme-surface) var(--tw-gradient-to-position) !important; }

    body .text-gray-800 { color: var(--theme-text-800) !important; }
    body .text-gray-700 { color: var(--theme-text-700) !important; }
    body .text-gray-600 { color: var(--theme-text-600) !important; }
    body .text-gray-500 { color: var(--theme-text-500) !important; }
    body .text-gray-400 { color: var(--theme-text-400) !important; }

    body .border-gray-200 { border-color: var(--theme-border-200) !important; }

    body .bg-indigo-700 { background-color: var(--theme-nav-bg) !important; }

    body .border-indigo-100 { border-color: var(--theme-accent-100) !important; }
    body .border-indigo-200 { border-color: var(--theme-accent-100) !important; }
    body .focus\:ring-indigo-400:focus { --tw-ring-color: var(--theme-focus-ring) !important; }

    aside {
      background-color: var(--theme-nav-bg) !important;
      color: var(--theme-nav-text) !important;
    }

    .md\:hidden.fixed.bottom-0.inset-x-0.bg-indigo-700 {
      background-color: var(--theme-nav-bg) !important;
      color: var(--theme-nav-text) !important;
    }

    aside .text-indigo-200,
    aside .hover\:text-white,
    aside .border-indigo-600 {
      color: var(--theme-nav-muted) !important;
      border-color: var(--theme-nav-border) !important;
    }

    html {
      scroll-behavior: smooth;
    }

    main {
      animation: page-enter 220ms ease-out;
    }

    @keyframes page-enter {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    button {
      position: relative;
      overflow: hidden;
      transition: transform 120ms ease, box-shadow 180ms ease, filter 180ms ease;
      will-change: transform;
    }

    button:hover {
      filter: brightness(1.03);
    }

    button:active {
      transform: translateY(1px) scale(0.98);
    }

    button:focus-visible {
      outline: 2px solid var(--theme-focus-ring);
      outline-offset: 2px;
    }

    .tap-ripple {
      position: absolute;
      border-radius: 9999px;
      background: var(--theme-ripple);
      pointer-events: none;
      transform: translate(-50%, -50%) scale(0.2);
      animation: ripple-burst 480ms ease-out forwards;
    }

    @keyframes ripple-burst {
      to {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      border-radius: 0.375rem;
      transition: background 0.15s;
    }

    .brand-lockup {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: max-content;
      margin: 0 auto 2rem auto;
      text-align: center;
      line-height: 1;
      transform: translateX(-8px);
    }

    .brand-lockup__icon {
      width: 44px;
      height: 44px;
      object-fit: contain;
      flex-shrink: 0;
      display: block;
    }

    .brand-lockup__title {
      display: block;
      white-space: nowrap;
    }

    .nav-link:hover { background: var(--theme-nav-hover); }
    .progress-bar { transition: width 0.4s ease; }
  </style>

  <script>
    document.addEventListener('click', (event) => {
      const button = event.target.closest('button');
      if (!button) return;

      const rect = button.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      const ripple = document.createElement('span');
      ripple.className = 'tap-ripple';
      ripple.style.width = size + 'px';
      ripple.style.height = size + 'px';
      ripple.style.left = (event.clientX - rect.left) + 'px';
      ripple.style.top = (event.clientY - rect.top) + 'px';

      button.appendChild(ripple);
      ripple.addEventListener('animationend', () => ripple.remove(), { once: true });
    });
  </script>
