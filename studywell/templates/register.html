{% extends "base.html" %}
{% block title %}Register — StudyWell{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
    <div class="text-center mb-6">
      <div class="text-3xl mb-2">📚</div>
      <h1 class="text-2xl font-bold">Create account</h1>
      <p class="text-sm text-gray-500 mt-1">Start tracking with StudyWell</p>
    </div>

    {% if error %}
    <div class="mb-4 px-4 py-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">{{ error }}</div>
    {% endif %}

    <form action="/register" method="post" class="flex flex-col gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" name="username" required autofocus autocomplete="username" minlength="3"
               class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required autocomplete="new-password" minlength="6"
               class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
        <input type="password" name="password_confirm" required autocomplete="new-password"
               class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      </div>
      <button type="submit"
              class="w-full py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-semibold text-sm mt-1">
        Create Account
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-5">
      Already have an account? <a href="/login" class="text-indigo-600 hover:underline font-medium">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
