{% extends "base.html" %}
{% block title %}Calendar — Chudlite™{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">Study Calendar</h1>

<div class="bg-white rounded-xl shadow p-6 mb-6">
  <div class="flex items-center justify-between mb-5">
    <div class="font-semibold text-gray-800" id="cal-month-label">—</div>
    <div class="flex gap-2">
      <button id="cal-prev" type="button" class="p-1.5 rounded-lg hover:bg-gray-100 text-gray-500 hover:text-gray-800 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
      </button>
      <button id="cal-next" type="button" class="p-1.5 rounded-lg hover:bg-gray-100 text-gray-500 hover:text-gray-800 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>

  <div class="grid grid-cols-7 mb-1">
    {% for d in ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'] %}
    <div class="text-center text-xs font-medium text-gray-400 py-1">{{ d }}</div>
    {% endfor %}
  </div>

  <div id="cal-grid" class="grid grid-cols-7 gap-px bg-gray-100 rounded-lg overflow-hidden"></div>

  <div id="cal-detail" class="hidden mt-5 border-t pt-4">
    <div class="flex items-center justify-between mb-3">
      <div class="font-medium text-gray-700" id="cal-detail-date"></div>
      <button id="cal-detail-close" type="button" class="text-gray-400 hover:text-gray-600 text-lg leading-none">&times;</button>
    </div>

    <ul id="cal-event-list" class="space-y-2 mb-4 empty:hidden"></ul>

    <form id="cal-add-form" class="flex flex-col gap-2">
      <input type="hidden" id="cal-event-date" name="event_date" />
      <input type="text" name="title" placeholder="Event title" required maxlength="100"
             class="border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      <div class="flex gap-2">
        <select name="event_type"
                class="flex-1 border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
          <option value="study">Study Session</option>
          <option value="important">Important Date</option>
          <option value="other">Other</option>
        </select>
        <button type="submit"
                class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 text-sm font-medium whitespace-nowrap">
          Add
        </button>
      </div>
      <input type="text" name="description" placeholder="Notes (optional)" maxlength="300"
             class="border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
    </form>
  </div>
</div>

<script>
(function () {
  const TYPE_META = {
    important: { label: 'Important', dot: 'bg-rose-500', badge: 'bg-rose-100 text-rose-700' },
    study: { label: 'Study', dot: 'bg-indigo-500', badge: 'bg-indigo-100 text-indigo-700' },
    other: { label: 'Other', dot: 'bg-gray-400', badge: 'bg-gray-100 text-gray-600' },
  };

  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

  const today = new Date();
  let viewYear = today.getFullYear();
  let viewMonth = today.getMonth();

  let eventsByDate = {};
  let selectedDate = null;

  const grid = document.getElementById('cal-grid');
  const label = document.getElementById('cal-month-label');
  const detail = document.getElementById('cal-detail');
  const detailDate = document.getElementById('cal-detail-date');
  const eventList = document.getElementById('cal-event-list');
  const addForm = document.getElementById('cal-add-form');
  const hiddenDate = document.getElementById('cal-event-date');

  document.getElementById('cal-prev').addEventListener('click', () => {
    viewMonth--;
    if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    loadMonth();
  });

  document.getElementById('cal-next').addEventListener('click', () => {
    viewMonth++;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    loadMonth();
  });

  document.getElementById('cal-detail-close').addEventListener('click', closeDetail);

  async function loadMonth() {
    const res = await fetch(`/study/calendar/events?year=${viewYear}&month=${viewMonth + 1}`);
    const events = await res.json();
    eventsByDate = {};
    for (const ev of events) {
      if (!eventsByDate[ev.date]) eventsByDate[ev.date] = [];
      eventsByDate[ev.date].push(ev);
    }
    renderGrid();
    if (selectedDate) renderDetail(selectedDate);
  }

  function renderGrid() {
    label.textContent = `${MONTHS[viewMonth]} ${viewYear}`;
    grid.innerHTML = '';

    const firstDay = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    const todayStr = today.toISOString().slice(0, 10);

    for (let i = 0; i < firstDay; i++) {
      const blank = document.createElement('div');
      blank.className = 'bg-white min-h-[88px]';
      grid.appendChild(blank);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${viewYear}-${String(viewMonth + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = dateStr === todayStr;
      const isSelected = dateStr === selectedDate;
      const evs = eventsByDate[dateStr] || [];
      const hasImportant = evs.some((e) => e.type === 'important');
      const hasStudy = evs.some((e) => e.type === 'study');
      const hasOther = evs.some((e) => e.type === 'other') && !hasImportant && !hasStudy;

      const bgColor = hasImportant ? 'bg-rose-50 hover:bg-rose-100'
                    : hasStudy ? 'bg-indigo-50 hover:bg-indigo-100'
                    : hasOther ? 'bg-gray-50 hover:bg-gray-100'
                    : 'bg-white hover:bg-indigo-50';

      const cell = document.createElement('div');
      cell.className = [
        `min-h-[88px] p-2 cursor-pointer transition-colors relative ${bgColor}`,
        isSelected ? 'ring-2 ring-inset ring-indigo-400' : '',
      ].join(' ');
      cell.dataset.date = dateStr;

      const numEl = document.createElement('div');
      numEl.className = `text-base font-semibold w-8 h-8 flex items-center justify-center rounded-full mx-auto mb-1 ${
        isToday ? 'bg-indigo-600 text-white' : 'text-gray-700'
      }`;
      numEl.textContent = d;
      cell.appendChild(numEl);

      if (evs.length) {
        const dots = document.createElement('div');
        dots.className = 'flex flex-wrap gap-1 justify-center';
        for (const ev of evs.slice(0, 3)) {
          const dot = document.createElement('span');
          dot.className = `inline-block w-2 h-2 rounded-full ${TYPE_META[ev.type]?.dot ?? 'bg-gray-400'}`;
          dots.appendChild(dot);
        }
        if (evs.length > 3) {
          const more = document.createElement('span');
          more.className = 'text-[10px] text-gray-400 leading-none';
          more.textContent = `+${evs.length - 3}`;
          dots.appendChild(more);
        }
        cell.appendChild(dots);
      }

      cell.addEventListener('click', () => selectDay(dateStr));
      grid.appendChild(cell);
    }
  }

  function selectDay(dateStr) {
    selectedDate = dateStr;
    renderGrid();
    renderDetail(dateStr);
  }

  function renderDetail(dateStr) {
    const [y, m, d] = dateStr.split('-');
    detailDate.textContent = `${MONTHS[parseInt(m, 10) - 1]} ${parseInt(d, 10)}, ${y}`;
    hiddenDate.value = dateStr;
    detail.classList.remove('hidden');

    const evs = eventsByDate[dateStr] || [];
    eventList.innerHTML = '';
    for (const ev of evs) {
      const meta = TYPE_META[ev.type] ?? TYPE_META.other;
      const li = document.createElement('li');
      li.className = 'flex items-start gap-2 text-sm';
      li.innerHTML = `
        <span class="mt-0.5 px-2 py-0.5 rounded text-xs font-medium ${meta.badge} whitespace-nowrap">${meta.label}</span>
        <div class="flex-1 min-w-0">
          <div class="font-medium text-gray-800 truncate">${escHtml(ev.title)}</div>
          ${ev.description ? `<div class="text-gray-400 text-xs truncate">${escHtml(ev.description)}</div>` : ''}
        </div>
        <button data-id="${ev.id}" class="cal-del-btn text-gray-300 hover:text-rose-500 transition-colors flex-shrink-0 text-base leading-none mt-0.5">&times;</button>
      `;
      eventList.appendChild(li);
    }

    eventList.querySelectorAll('.cal-del-btn').forEach((btn) => {
      btn.addEventListener('click', async () => {
        await fetch(`/study/calendar/${btn.dataset.id}/delete`, { method: 'POST' });
        await loadMonth();
      });
    });
  }

  function closeDetail() {
    detail.classList.add('hidden');
    selectedDate = null;
    renderGrid();
  }

  addForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(addForm);
    await fetch('/study/calendar/add', { method: 'POST', body: fd });
    addForm.reset();
    addForm.querySelector('[name="event_date"]').value = selectedDate;
    await loadMonth();
  });

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\"/g, '&quot;');
  }

  loadMonth();
})();
</script>
{% endblock %}
